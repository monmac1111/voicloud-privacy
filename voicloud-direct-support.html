*{box-sizing:border-box;margin:0;padding:0}

.lang-btn{padding:4px 11px;border:1.5px solid #d1d1d6;border-radius:14px;cursor:pointer;font-size:13px;background:none;color:#636366;font-family:inherit;transition:all .15s}
.lang-btn:hover{border-color:#007AFF;color:#007AFF}
.lang-btn.active{background:#007AFF;border-color:#007AFF;color:#fff}
.page-header{margin-bottom:32px}
h1{font-size:26px;font-weight:700;margin-bottom:6px;line-height:1.2}
.subtitle{color:#8e8e93;font-size:14px}
h3{font-size:16px;font-weight:600;margin-top:28px;margin-bottom:8px;color:#1d1d1f}
p{margin-bottom:12px;color:#3d3d3f;font-size:15px}
ul{padding-left:20px;margin-bottom:12px}
li{color:#3d3d3f;font-size:15px;margin-bottom:4px;line-height:1.6}
.contact-box{background:#f5f5f7;border-radius:12px;padding:20px 24px;margin-top:40px}
.contact-box h3{margin-top:0}
.footer{margin-top:40px;padding-top:20px;border-top:1px solid #e5e5ea;font-size:13px;color:#8e8e93}

details{border:1px solid #e5e5ea;border-radius:10px;margin-bottom:10px;overflow:hidden}

summary::-webkit-details-marker{display:none}
summary::after{content:"\203A";margin-left:auto;font-size:18px;color:#8e8e93;transition:transform .2s;display:inline-block}
details[open]>summary::after{transform:rotate(90deg)}
.topic-body{padding:14px 16px 16px;background:#fff}
.topic-body p{margin-bottom:10px;font-size:15px}
.topic-body ul{margin-bottom:10px}
.topic-icon{font-size:16px}
.related-links{margin-top:32px}
.related-links h3{margin-bottom:12px}
.link-row{display:flex;gap:8px;flex-wrap:wrap}
.link-pill{display:inline-block;padding:6px 14px;background:#f5f5f7;border-radius:20px;font-size:14px;color:#007AFF}

<script>
(function() {
  var LANGS = ["ja", "en", "de", "es", "fr", "ko", "zh-Hans"];
  var LABELS = {"ja": "日本語", "en": "English", "de": "Deutsch", "es": "Español", "fr": "Français", "ko": "한국어", "zh-Hans": "中文"};
  var i18n = {
    "ja": {"title": "Voicloud Direct — ヘルプ / サポート", "heading": "ヘルプ / サポート", "tagline": "よくある質問とトラブルシューティング", "topics": "<details id=\"flow\"><summary>基本的な使い方</summary><div class=\"topic-body\"><p>1. ホーム画面の録音ボタンで録音を開始します。\n2. 停止すると、接続済みのクラウドへ自動でアップロードされます。\n3. 録音をタップして詳細画面を開き、「AI に送る」または BYOK の文字起こしを実行します。\n4. 文字起こし結果は同じクラウドに .md ファイルとして同期されます。</p></div></details>\n<details id=\"cloud\"><summary>クラウドに接続する</summary><div class=\"topic-body\"><p>対応クラウド: iCloud Drive / Google Drive / Dropbox / OneDrive / Box の 5 つ。</p>\n<p>設定 → クラウド同期 から接続したいサービスをタップしてサインインします。接続済みのクラウド全部に、録音時に自動でアップロードされます。iCloud Drive はサインイン不要。OS 側で iCloud Drive が有効なら自動的に使えます。録音した後にクラウドを追加した場合は、詳細画面の「クラウド同期」セクションで後追いアップロードできます。</p></div></details>\n<details id=\"ai_send\"><summary>音声を AI に送る（Share Sheet）</summary><div class=\"topic-body\"><p>詳細画面の「AI に送る」をタップすると、iOS の共有シートが開きます。NotebookLM がインストールされていれば、そのまま音声ファイルを取り込めます。ヒント: 共有シートで「編集」→ NotebookLM を「よく使う項目」に追加すると、毎回トップに出るようになります。</p></div></details>\n<details id=\"byok\"><summary>BYOK 文字起こし（API キーで使う）</summary><div class=\"topic-body\"><p>自分で取得した API キーで、アプリ内で直接文字起こしできます。対応プロバイダ: OpenAI（話者分離なし）、Gemini AI Studio（無料枠あり、話者分離対応）、Vertex AI（Google Cloud のサービスアカウント）。設定 → AI 文字起こし からプロバイダを選び、API キーを貼り付けます。キーは端末の Keychain に暗号化保存されます。</p></div></details>\n<details id=\"summary\"><summary>要約と要約プロンプト</summary><div class=\"topic-body\"><p>文字起こし済みの録音は、同じプロバイダで要約も生成できます。設定 → 要約プロンプト で、要約のスタイルをプリセットから選ぶか、自由記述に編集できます（標準 / 会議議事録 / 雑談 / インタビュー / メモ）。OpenAI は要約用モデルを別途指定できます（例: gpt-4o-mini）。Pro / reasoning 系は推論時間が長くなる代わりに品質が上がります。</p></div></details>\n<details id=\"diarization\"><summary>話者分離のコツ</summary><div class=\"topic-body\"><p>Gemini 系での話者分離は、声質の似た同性同年代の話者で取り違えやすい弱点があります。対策: 詳細画面の「話者数」を実際の人数に設定すると精度が上がります。設定 → 文字起こしプロンプト で独自の手がかりを追加することもできます。OpenAI Whisper / gpt-4o-transcribe では話者分離自体ができません。</p></div></details>\n<details id=\"playback\"><summary>再生・シーク・速度</summary><div class=\"topic-body\"><p>波形をタップまたはドラッグするとその位置に移動して再生できます。再生速度は「1x」タップで 0.75x → 1x → 1.25x → 1.5x → 2x の順に切り替わります。10 秒戻る / 進むボタンも使えます。文字起こしや要約をスクロールしている間も、波形と再生時刻は画面上部にピン留めされたままです。</p></div></details>\n<details id=\"action_button\"><summary>Action Button と Live Activity（iPhone 15 Pro 以降）</summary><div class=\"topic-body\"><p>iPhone 15 Pro 以降では、本体側面のアクションボタンを「ショートカット → Voicloud Direct → Toggle Recording」に割り当てると、ボタン長押しだけで録音開始・停止ができます。録音中は Dynamic Island とロック画面に赤いバッジが出て、現在の経過時間が見えます。</p></div></details>\n<details id=\"calendar_location\"><summary>カレンダー連動・位置情報</summary><div class=\"topic-body\"><p>設定 → 録音 でカレンダー連動をオンにすると、録音開始時にカレンダーで進行中の予定があれば、その予定名がファイル名に反映されます。位置情報をオンにすると、録音にメタデータとして座標と住所が保存されます。どちらも任意で OFF でも全機能は使えます。</p></div></details>\n<details id=\"background\"><summary>バックグラウンド動作について</summary><div class=\"topic-body\"><p>録音は、画面ロックや別アプリに切り替えた状態でも継続します（音声バックグラウンドモード）。文字起こし / 要約の API 呼び出しは、最大数分間はバックグラウンドでも生きていますが、長時間（特に Pro reasoning）は前面に置いておくのが安全です。クラウドアップロードが途中で止まった場合は、iOS が空いたタイミングで自動的にリトライします。</p></div></details>\n<details id=\"privacy\"><summary>プライバシーとデータの扱い</summary><div class=\"topic-body\"><p>録音音声は端末内と、あなたが選んだクラウドにのみ保存されます。API キー / サービスアカウント JSON は端末の Keychain に暗号化保存されます。文字起こし / 要約は、あなたが選んだ AI プロバイダのサーバーに直接送信されます。解析・広告・トラッキングは一切行いません。</p></div></details>\n<details id=\"troubleshooting\"><summary>うまくいかないとき</summary><div class=\"topic-body\"><p>文字起こしがおかしい: OpenAI Whisper-1 は無音区間に「【早送り中】」を挿入する癖があります。gpt-4o-transcribe に切り替えると改善します。</p>\n<p>クラウドにアップロードされない: 設定でそのクラウドが「接続中」になっているか確認し、OAuth トークンが切れていれば一度切断 → 再接続してください。</p>\n<p>Action Button が反応しない: iOS 設定 → アクションボタン → ショートカット → Voicloud Direct の Toggle Recording を選択しているか確認してください。初回はマイク権限と通知権限を許可する必要があります。</p>\n<p>それでも解決しない場合は、お問い合わせください。</p></div></details>\n", "relatedLinks": "関連リンク", "privacyLink": "プライバシーポリシー", "contact": "<div class=\"contact-box\"><h3>お問い合わせ</h3><p>不具合・機能リクエスト・ご質問はメールでどうぞ。平日 1-3 営業日以内に返信します。</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"},
    "en": {"title": "Voicloud Direct — Help / Support", "heading": "Help / Support", "tagline": "Frequently Asked Questions and Troubleshooting", "topics": "<details id=\"flow\"><summary>Basic Usage</summary><div class=\"topic-body\"><p>1. Tap the record button on the home screen to start recording.\n2. When you stop, the audio is automatically uploaded to any connected cloud services.\n3. Tap a recording to open the detail view and run &quot;Send to AI&quot; or BYOK transcription.\n4. Transcription results are synced to the same cloud as a .md file.</p></div></details>\n<details id=\"cloud\"><summary>Connecting to Cloud Storage</summary><div class=\"topic-body\"><p>Supported services: iCloud Drive / Google Drive / Dropbox / OneDrive / Box — five options in total.</p>\n<p>Go to Settings → Cloud Sync, tap the service you want to connect, and sign in. All connected clouds receive automatic uploads whenever you record. iCloud Drive requires no sign-in — if iCloud Drive is enabled at the OS level, it is used automatically. If you add a cloud after recording, you can upload retroactively from the &quot;Cloud Sync&quot; section in the recording's detail view.</p></div></details>\n<details id=\"ai_send\"><summary>Send Audio to AI (Share Sheet)</summary><div class=\"topic-body\"><p>Tap &quot;Send to AI&quot; in the detail view to open the iOS Share Sheet. If NotebookLM is installed, you can import the audio file directly into it. Tip: In the Share Sheet, tap &quot;Edit&quot; and add NotebookLM to your Favorites so it always appears at the top.</p></div></details>\n<details id=\"byok\"><summary>BYOK Transcription (Use Your Own API Key)</summary><div class=\"topic-body\"><p>Transcribe audio directly within the app using your own API key. Supported providers: OpenAI (no speaker diarization), Gemini AI Studio (free tier available, speaker diarization supported), Vertex AI (Google Cloud service account). Go to Settings → AI Transcription, select a provider, and paste your API key. Keys are encrypted and stored in the device's Keychain.</p></div></details>\n<details id=\"summary\"><summary>Summaries and Summary Prompts</summary><div class=\"topic-body\"><p>Once a recording has been transcribed, you can also generate a summary using the same provider. Go to Settings → Summary Prompt to choose a summary style from presets or write your own (Standard / Meeting Minutes / Casual Chat / Interview / Memo). For OpenAI, you can specify a separate model for summaries (e.g., gpt-4o-mini). Pro / reasoning models take longer to respond but produce higher-quality results.</p></div></details>\n<details id=\"diarization\"><summary>Tips for Speaker Diarization</summary><div class=\"topic-body\"><p>With Gemini-based diarization, speakers of similar voice quality — same gender and age group — can sometimes be confused. To improve accuracy, set the &quot;Number of Speakers&quot; in the detail view to the actual number of people in the recording. You can also add custom hints in Settings → Transcription Prompt. Speaker diarization is not supported with OpenAI Whisper / gpt-4o-transcribe.</p></div></details>\n<details id=\"playback\"><summary>Playback, Seeking, and Speed</summary><div class=\"topic-body\"><p>Tap or drag on the waveform to jump to that position and play from there. Tap &quot;1x&quot; to cycle through playback speeds: 0.75x → 1x → 1.25x → 1.5x → 2x. Skip-back and skip-forward buttons (10 seconds each) are also available. While scrolling through transcriptions or summaries, the waveform and playback timestamp remain pinned at the top of the screen.</p></div></details>\n<details id=\"action_button\"><summary>Action Button and Live Activity (iPhone 15 Pro and later)</summary><div class=\"topic-body\"><p>On iPhone 15 Pro and later, you can assign the side Action Button to Shortcuts → Voicloud Direct → Toggle Recording, allowing you to start and stop recording with a long press of the button alone. During recording, a red badge appears on the Dynamic Island and the Lock Screen showing the current elapsed time.</p></div></details>\n<details id=\"calendar_location\"><summary>Calendar Integration and Location</summary><div class=\"topic-body\"><p>Turn on calendar integration in Settings → Recording. If an event is in progress in your calendar when recording starts, the event name will be reflected in the file name. Turning on location saves coordinates and an address as metadata in the recording. Both options are optional — all features work fine with them turned off.</p></div></details>\n<details id=\"background\"><summary>Background Behavior</summary><div class=\"topic-body\"><p>Recording continues even when the screen is locked or you switch to another app (audio background mode). Transcription / summary API calls remain active in the background for up to several minutes, but for long requests — especially Pro reasoning models — it is safer to keep the app in the foreground. If a cloud upload is interrupted, it will retry automatically when iOS has available resources.</p></div></details>\n<details id=\"privacy\"><summary>Privacy and Data Handling</summary><div class=\"topic-body\"><p>Audio recordings are stored only on your device and in the cloud services you choose. API keys and service account JSON files are encrypted and stored in the device's Keychain. Transcriptions and summaries are sent directly to the AI provider you select. No analytics, advertising, or tracking of any kind is performed.</p></div></details>\n<details id=\"troubleshooting\"><summary>Troubleshooting</summary><div class=\"topic-body\"><p>Transcription looks wrong: OpenAI Whisper-1 has a tendency to insert filler text such as &quot;[Fast forwarding]&quot; during silent segments. Switching to gpt-4o-transcribe typically resolves this.</p>\n<p>Audio is not uploading to the cloud: Check that the cloud service shows as &quot;Connected&quot; in Settings. If the OAuth token has expired, disconnect and reconnect the service.</p>\n<p>Action Button is not responding: Go to iOS Settings → Action Button → Shortcuts → and confirm that Toggle Recording under Voicloud Direct is selected. On first use, you must grant microphone and notification permissions.</p>\n<p>If the issue persists, please contact us.</p></div></details>\n", "relatedLinks": "Related Links", "privacyLink": "Privacy Policy", "contact": "<div class=\"contact-box\"><h3>Contact Us</h3><p>For bug reports, feature requests, or general questions, please reach out by email. We aim to respond within 1–3 business days.</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"},
    "de": {"title": "Voicloud Direct — Hilfe / Support", "heading": "Hilfe / Support", "tagline": "Häufig gestellte Fragen und Fehlerbehebung", "topics": "<details id=\"flow\"><summary>Grundlegende Verwendung</summary><div class=\"topic-body\"><p>1. Starten Sie die Aufnahme mit der Aufnahmetaste auf dem Startbildschirm.\n2. Nach dem Stoppen wird die Aufnahme automatisch in die verbundene Cloud hochgeladen.\n3. Tippen Sie auf eine Aufnahme, um die Detailansicht zu öffnen, und führen Sie &quot;An KI senden&quot; oder die BYOK-Transkription durch.\n4. Das Transkriptionsergebnis wird als .md-Datei in derselben Cloud synchronisiert.</p></div></details>\n<details id=\"cloud\"><summary>Verbindung mit der Cloud</summary><div class=\"topic-body\"><p>Unterstützte Cloud-Dienste: iCloud Drive / Google Drive / Dropbox / OneDrive / Box – insgesamt 5 Dienste.</p>\n<p>Gehen Sie zu Einstellungen → Cloud-Synchronisierung, tippen Sie auf den gewünschten Dienst und melden Sie sich an. Bei allen verbundenen Clouds wird die Aufnahme automatisch hochgeladen. iCloud Drive erfordert keine Anmeldung – wenn iCloud Drive auf Betriebssystemebene aktiviert ist, wird es automatisch verwendet. Falls Sie nach einer Aufnahme einen Cloud-Dienst hinzufügen, können Sie den Upload nachträglich im Abschnitt &quot;Cloud-Synchronisierung&quot; in der Detailansicht durchführen.</p></div></details>\n<details id=\"ai_send\"><summary>Audio an KI senden (Share Sheet)</summary><div class=\"topic-body\"><p>Wenn Sie in der Detailansicht auf &quot;An KI senden&quot; tippen, öffnet sich das iOS Share Sheet. Wenn NotebookLM installiert ist, können Sie die Audiodatei direkt importieren. Tipp: Tippen Sie im Share Sheet auf &quot;Bearbeiten&quot; und fügen Sie NotebookLM zu den &quot;Favoriten&quot; hinzu, damit es jedes Mal ganz oben erscheint.</p></div></details>\n<details id=\"byok\"><summary>BYOK-Transkription (Verwendung mit API-Schlüssel)</summary><div class=\"topic-body\"><p>Mit einem selbst erworbenen API-Schlüssel können Sie Transkriptionen direkt in der App durchführen. Unterstützte Anbieter: OpenAI (ohne Sprechertrennung), Gemini AI Studio (mit kostenlosem Kontingent, mit Sprechertrennung), Vertex AI (Google Cloud-Dienstkonto). Gehen Sie zu Einstellungen → KI-Transkription, wählen Sie einen Anbieter und fügen Sie Ihren API-Schlüssel ein. Der Schlüssel wird verschlüsselt in der Keychain Ihres Geräts gespeichert.</p></div></details>\n<details id=\"summary\"><summary>Zusammenfassung und Zusammenfassungsaufforderungen</summary><div class=\"topic-body\"><p>Für bereits transkribierte Aufnahmen kann mit demselben Anbieter auch eine Zusammenfassung erstellt werden. Unter Einstellungen → Zusammenfassungsaufforderung können Sie den Zusammenfassungsstil aus Voreinstellungen auswählen oder frei bearbeiten (Standard / Besprechungsprotokoll / Plauderei / Interview / Notizen). Für OpenAI kann ein separates Modell für die Zusammenfassung festgelegt werden (z. B. gpt-4o-mini). Pro- und Reasoning-Modelle benötigen zwar mehr Rechenzeit, liefern aber eine höhere Qualität.</p></div></details>\n<details id=\"diarization\"><summary>Tipps zur Sprechertrennung</summary><div class=\"topic-body\"><p>Bei Gemini-Diensten besteht die Schwäche, dass Sprecher des gleichen Geschlechts und Alters mit ähnlicher Stimme verwechselt werden können. Als Gegenmaßnahme können Sie in der Detailansicht die &quot;Sprecheranzahl&quot; auf die tatsächliche Personenanzahl einstellen, um die Genauigkeit zu verbessern. Unter Einstellungen → Transkriptionsaufforderung können Sie auch eigene Hinweise hinzufügen. Mit OpenAI Whisper / gpt-4o-transcribe ist eine Sprechertrennung grundsätzlich nicht möglich.</p></div></details>\n<details id=\"playback\"><summary>Wiedergabe, Suche und Geschwindigkeit</summary><div class=\"topic-body\"><p>Tippen oder ziehen Sie auf die Wellenform, um zu einer bestimmten Position zu springen und die Wiedergabe zu starten. Die Wiedergabegeschwindigkeit kann durch Tippen auf &quot;1x&quot; in der Reihenfolge 0,75x → 1x → 1,25x → 1,5x → 2x umgeschaltet werden. Es stehen auch Schaltflächen zum 10-Sekunden-Rückspringen und -Vorspringen zur Verfügung. Auch während des Scrollens durch Transkriptionen oder Zusammenfassungen bleiben die Wellenform und die Wiedergabezeit oben auf dem Bildschirm fixiert.</p></div></details>\n<details id=\"action_button\"><summary>Action Button und Live Activity (iPhone 15 Pro und neuer)</summary><div class=\"topic-body\"><p>Beim iPhone 15 Pro und neueren Modellen können Sie den Aktionsknopf an der Seite des Geräts unter &quot;Shortcuts → Voicloud Direct → Toggle Recording&quot; belegen, um die Aufnahme durch langes Drücken des Knopfes zu starten und zu stoppen. Während der Aufnahme erscheint ein roter Badge in der Dynamic Island und auf dem Sperrbildschirm, der die aktuelle Aufnahmedauer anzeigt.</p></div></details>\n<details id=\"calendar_location\"><summary>Kalenderintegration und Standort</summary><div class=\"topic-body\"><p>Wenn Sie unter Einstellungen → Aufnahme die Kalenderintegration aktivieren, wird bei Aufnahmebeginn der Name eines laufenden Kalendereintrags in den Dateinamen übernommen. Wenn Sie den Standort aktivieren, werden Koordinaten und Adresse als Metadaten in der Aufnahme gespeichert. Beide Optionen sind optional – auch ohne sie sind alle Funktionen nutzbar.</p></div></details>\n<details id=\"background\"><summary>Hintergrundbetrieb</summary><div class=\"topic-body\"><p>Die Aufnahme wird auch bei gesperrtem Bildschirm oder beim Wechsel zu einer anderen App fortgesetzt (Audio-Hintergrundmodus). API-Aufrufe für Transkription und Zusammenfassung bleiben bis zu einigen Minuten im Hintergrund aktiv. Bei langen Vorgängen (insbesondere bei Pro Reasoning) ist es jedoch sicherer, die App im Vordergrund zu halten. Wenn ein Cloud-Upload unterbrochen wird, wiederholt iOS den Versuch automatisch, sobald es Kapazitäten hat.</p></div></details>\n<details id=\"privacy\"><summary>Datenschutz und Datenverarbeitung</summary><div class=\"topic-body\"><p>Aufnahmen werden nur auf dem Gerät und in der von Ihnen gewählten Cloud gespeichert. API-Schlüssel und Dienstkonto-JSON werden verschlüsselt in der Keychain des Geräts gespeichert. Transkriptionen und Zusammenfassungen werden direkt an den von Ihnen gewählten KI-Anbieter gesendet. Es werden keinerlei Analysen, Werbung oder Tracking durchgeführt.</p></div></details>\n<details id=\"troubleshooting\"><summary>Problembehandlung</summary><div class=\"topic-body\"><p>Transkription fehlerhaft: OpenAI Whisper-1 neigt dazu, in Stille-Abschnitten &quot;[Schneller Vorlauf]&quot; einzufügen. Ein Wechsel zu gpt-4o-transcribe kann Abhilfe schaffen.</p>\n<p>Upload in die Cloud schlägt fehl: Prüfen Sie, ob der Cloud-Dienst in den Einstellungen als &quot;Verbunden&quot; angezeigt wird. Falls das OAuth-Token abgelaufen ist, trennen Sie die Verbindung und stellen Sie sie erneut her.</p>\n<p>Action Button reagiert nicht: Prüfen Sie unter iOS Einstellungen → Aktionsknopf → Shortcuts → Voicloud Direct, ob Toggle Recording ausgewählt ist. Beim ersten Mal müssen Mikrofon- und Benachrichtigungsberechtigungen erteilt werden.</p>\n<p>Falls das Problem weiterhin besteht, wenden Sie sich bitte an unseren Support.</p></div></details>\n", "relatedLinks": "Verwandte Links", "privacyLink": "Datenschutzrichtlinie", "contact": "<div class=\"contact-box\"><h3>Kontakt</h3><p>Bei Problemen, Funktionswünschen oder Fragen wenden Sie sich bitte per E-Mail an uns. Wir antworten innerhalb von 1–3 Werktagen.</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"},
    "es": {"title": "Voicloud Direct — Ayuda / Soporte", "heading": "Ayuda / Soporte", "tagline": "Preguntas frecuentes y solución de problemas", "topics": "<details id=\"flow\"><summary>Uso básico</summary><div class=\"topic-body\"><p>1. Inicia la grabación con el botón de grabar en la pantalla principal.\n2. Al detenerla, el audio se sube automáticamente a los servicios en la nube conectados.\n3. Toca la grabación para abrir la pantalla de detalles y ejecuta la transcripción con &quot;Enviar a IA&quot; o con BYOK.\n4. El resultado de la transcripción se sincroniza en el mismo servicio en la nube como archivo .md.</p></div></details>\n<details id=\"cloud\"><summary>Conectar con la nube</summary><div class=\"topic-body\"><p>Servicios compatibles: iCloud Drive, Google Drive, Dropbox, OneDrive y Box (5 en total).</p>\n<p>Ve a Settings → Sincronización en la nube, toca el servicio que deseas conectar e inicia sesión. Todos los servicios conectados recibirán las grabaciones automáticamente al grabar. iCloud Drive no requiere inicio de sesión: si iCloud Drive está activado en el sistema operativo, se usará de forma automática. Si añades un servicio en la nube después de haber grabado, puedes subir los archivos manualmente desde la sección &quot;Sincronización en la nube&quot; en la pantalla de detalles.</p></div></details>\n<details id=\"ai_send\"><summary>Enviar audio a la IA (Share Sheet)</summary><div class=\"topic-body\"><p>Al tocar &quot;Enviar a IA&quot; en la pantalla de detalles, se abre el Share Sheet de iOS. Si NotebookLM está instalado, puedes importar el archivo de audio directamente. Consejo: en el Share Sheet, toca &quot;Editar&quot; y añade NotebookLM a &quot;Favoritos&quot; para que aparezca en la parte superior cada vez.</p></div></details>\n<details id=\"byok\"><summary>Transcripción BYOK (usar con clave API propia)</summary><div class=\"topic-body\"><p>Puedes transcribir directamente dentro de la app usando tu propia clave API. Proveedores compatibles: OpenAI (sin separación de hablantes), Gemini AI Studio (nivel gratuito disponible, con separación de hablantes) y Vertex AI (cuenta de servicio de Google Cloud). Ve a Settings → Transcripción con IA, selecciona el proveedor y pega tu clave API. La clave se guarda cifrada en el Keychain del dispositivo.</p></div></details>\n<details id=\"summary\"><summary>Resumen y prompts de resumen</summary><div class=\"topic-body\"><p>Las grabaciones ya transcritas también pueden generar un resumen con el mismo proveedor. En Settings → Prompt de resumen puedes elegir el estilo entre los presets disponibles o escribir uno personalizado (Estándar / Actas de reunión / Conversación informal / Entrevista / Notas). Con OpenAI puedes especificar un modelo distinto para los resúmenes (por ejemplo, gpt-4o-mini). Los modelos Pro / reasoning tardan más en razonar, pero ofrecen mayor calidad.</p></div></details>\n<details id=\"diarization\"><summary>Consejos para la separación de hablantes</summary><div class=\"topic-body\"><p>La separación de hablantes con los modelos Gemini puede confundirse entre hablantes del mismo género y edad similar con voces parecidas. Solución: ajustar el campo &quot;Número de hablantes&quot; en la pantalla de detalles al número real de participantes mejora la precisión. También puedes añadir indicaciones personalizadas en Settings → Prompt de transcripción. OpenAI Whisper y gpt-4o-transcribe no admiten separación de hablantes.</p></div></details>\n<details id=\"playback\"><summary>Reproducción, búsqueda y velocidad</summary><div class=\"topic-body\"><p>Toca o arrastra la forma de onda para saltar a esa posición y reproducir desde ahí. La velocidad de reproducción cambia al tocar &quot;1x&quot; en el orden: 0.75x → 1x → 1.25x → 1.5x → 2x. También puedes usar los botones de retroceder / avanzar 10 segundos. Mientras desplazas la transcripción o el resumen, la forma de onda y el tiempo de reproducción permanecen fijados en la parte superior de la pantalla.</p></div></details>\n<details id=\"action_button\"><summary>Action Button y Live Activity (iPhone 15 Pro y posteriores)</summary><div class=\"topic-body\"><p>En iPhone 15 Pro y modelos posteriores, puedes asignar el botón de acción lateral a Shortcuts → Voicloud Direct → Toggle Recording para iniciar y detener la grabación con solo mantener pulsado el botón. Durante la grabación, aparece un indicador rojo en el Dynamic Island y en la pantalla de bloqueo que muestra el tiempo transcurrido.</p></div></details>\n<details id=\"calendar_location\"><summary>Integración con calendario y ubicación</summary><div class=\"topic-body\"><p>Si activas la integración con el calendario en Settings → Grabación, cuando haya un evento en curso en el momento de iniciar la grabación, el nombre de ese evento se reflejará en el nombre del archivo. Si activas la ubicación, las coordenadas y la dirección se guardarán como metadatos de la grabación. Ambas opciones son opcionales; todas las funciones están disponibles aunque estén desactivadas.</p></div></details>\n<details id=\"background\"><summary>Funcionamiento en segundo plano</summary><div class=\"topic-body\"><p>La grabación continúa aunque bloquees la pantalla o cambies a otra app (modo de audio en segundo plano). Las llamadas a la API de transcripción y resumen permanecen activas en segundo plano durante varios minutos, pero para los modelos de larga duración (especialmente Pro reasoning) es más seguro mantener la app en primer plano. Si una subida a la nube se interrumpe, iOS la reintentará automáticamente cuando tenga disponibilidad.</p></div></details>\n<details id=\"privacy\"><summary>Privacidad y manejo de datos</summary><div class=\"topic-body\"><p>Las grabaciones de audio se almacenan únicamente en el dispositivo y en el servicio en la nube que hayas elegido. Las claves API y el JSON de cuentas de servicio se guardan cifrados en el Keychain del dispositivo. Las transcripciones y resúmenes se envían directamente a los servidores del proveedor de IA que hayas seleccionado. No se realiza ningún análisis, publicidad ni seguimiento.</p></div></details>\n<details id=\"troubleshooting\"><summary>Solución de problemas</summary><div class=\"topic-body\"><p>La transcripción es incorrecta: OpenAI Whisper-1 tiene tendencia a insertar texto como &quot;[reproducción rápida]&quot; en los silencios. Cambiar a gpt-4o-transcribe suele resolver el problema.</p>\n<p>El audio no se sube a la nube: Comprueba en Settings que el servicio aparece como &quot;Conectado&quot;. Si el token OAuth ha caducado, desconéctalo y vuelve a conectarlo.</p>\n<p>El Action Button no responde: Verifica en Settings de iOS → Botón de acción → Shortcuts que tienes seleccionado Toggle Recording de Voicloud Direct. La primera vez deberás conceder los permisos de micrófono y notificaciones.</p>\n<p>Si el problema persiste, contacta con nosotros.</p></div></details>\n", "relatedLinks": "Enlaces relacionados", "privacyLink": "Política de privacidad", "contact": "<div class=\"contact-box\"><h3>Contacto</h3><p>Para errores, solicitudes de funciones o cualquier pregunta, escríbenos por correo electrónico. Respondemos en 1-3 días hábiles.</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"},
    "fr": {"title": "Voicloud Direct — Aide / Support", "heading": "Aide / Support", "tagline": "Foire aux questions et résolution des problèmes", "topics": "<details id=\"flow\"><summary>Utilisation de base</summary><div class=\"topic-body\"><p>1. Appuyez sur le bouton d'enregistrement sur l'écran d'accueil pour démarrer un enregistrement.\n2. Lorsque vous arrêtez, le fichier est automatiquement téléversé vers le(s) cloud(s) connecté(s).\n3. Appuyez sur l'enregistrement pour ouvrir l'écran de détail, puis lancez la transcription via « Envoyer à l'IA » ou BYOK.\n4. Le résultat de la transcription est synchronisé dans le même cloud sous forme de fichier .md.</p></div></details>\n<details id=\"cloud\"><summary>Connecter un service cloud</summary><div class=\"topic-body\"><p>Services compatibles : iCloud Drive / Google Drive / Dropbox / OneDrive / Box — 5 services au total.</p>\n<p>Allez dans Réglages → Synchronisation cloud, appuyez sur le service souhaité et connectez-vous. Tous les clouds connectés reçoivent automatiquement chaque enregistrement. iCloud Drive ne nécessite aucune connexion : il est utilisé automatiquement dès qu'il est activé dans les réglages du système. Si vous ajoutez un cloud après avoir effectué un enregistrement, vous pouvez effectuer un téléversement différé depuis la section « Synchronisation cloud » de l'écran de détail.</p></div></details>\n<details id=\"ai_send\"><summary>Envoyer l'audio à l'IA (Share Sheet)</summary><div class=\"topic-body\"><p>Appuyez sur « Envoyer à l'IA » dans l'écran de détail pour ouvrir le Share Sheet iOS. Si NotebookLM est installé, vous pouvez y importer directement le fichier audio. Astuce : dans le Share Sheet, appuyez sur « Modifier » et ajoutez NotebookLM aux « Favoris » pour qu'il apparaisse en tête de liste à chaque fois.</p></div></details>\n<details id=\"byok\"><summary>Transcription BYOK (avec votre propre clé API)</summary><div class=\"topic-body\"><p>Transcrivez directement dans l'application en utilisant votre propre clé API. Fournisseurs compatibles : OpenAI (sans séparation des interlocuteurs), Gemini AI Studio (quota gratuit disponible, séparation des interlocuteurs prise en charge), Vertex AI (compte de service Google Cloud). Allez dans Réglages → Transcription IA, sélectionnez un fournisseur et collez votre clé API. La clé est chiffrée et stockée dans le Keychain de l'appareil.</p></div></details>\n<details id=\"summary\"><summary>Résumé et invite de résumé</summary><div class=\"topic-body\"><p>Pour les enregistrements déjà transcrits, vous pouvez également générer un résumé via le même fournisseur. Dans Réglages → Invite de résumé, choisissez un style parmi les préréglages ou rédigez librement votre propre invite (Standard / Compte-rendu de réunion / Conversation informelle / Interview / Notes). OpenAI permet de spécifier un modèle dédié à la génération de résumés (ex. : gpt-4o-mini). Les modèles Pro / reasoning offrent une meilleure qualité au prix d'un temps d'inférence plus long.</p></div></details>\n<details id=\"diarization\"><summary>Conseils pour la séparation des interlocuteurs</summary><div class=\"topic-body\"><p>Avec les modèles Gemini, la séparation des interlocuteurs peut être imprécise entre locuteurs du même sexe et de la même tranche d'âge ayant une voix similaire. Solution : définissez le « Nombre d'interlocuteurs » dans l'écran de détail sur le nombre réel de personnes pour améliorer la précision. Vous pouvez également ajouter des indices personnalisés dans Réglages → Invite de transcription. La séparation des interlocuteurs n'est pas disponible avec OpenAI Whisper / gpt-4o-transcribe.</p></div></details>\n<details id=\"playback\"><summary>Lecture, déplacement et vitesse</summary><div class=\"topic-body\"><p>Appuyez ou faites glisser sur la forme d'onde pour vous déplacer à la position souhaitée et lancer la lecture. Appuyez sur « 1x » pour faire défiler les vitesses : 0,75x → 1x → 1,25x → 1,5x → 2x. Des boutons de retour / avance de 10 secondes sont également disponibles. Même lorsque vous faites défiler la transcription ou le résumé, la forme d'onde et le temps de lecture restent épinglés en haut de l'écran.</p></div></details>\n<details id=\"action_button\"><summary>Action Button et Live Activity (iPhone 15 Pro et ultérieur)</summary><div class=\"topic-body\"><p>Sur iPhone 15 Pro et les modèles ultérieurs, vous pouvez assigner le bouton Action de l'appareil à « Raccourcis → Voicloud Direct → Toggle Recording » pour démarrer et arrêter un enregistrement d'une simple pression prolongée. Pendant l'enregistrement, un badge rouge apparaît sur le Dynamic Island et l'écran verrouillé, affichant la durée écoulée en temps réel.</p></div></details>\n<details id=\"calendar_location\"><summary>Intégration calendrier et localisation</summary><div class=\"topic-body\"><p>Si vous activez l'intégration calendrier dans Réglages → Enregistrement, le nom de l'événement en cours au moment du démarrage de l'enregistrement sera inclus dans le nom du fichier. Si vous activez la localisation, les coordonnées GPS et l'adresse seront enregistrées en tant que métadonnées de l'enregistrement. Ces deux options sont facultatives et toutes les fonctionnalités restent disponibles même si elles sont désactivées.</p></div></details>\n<details id=\"background\"><summary>Fonctionnement en arrière-plan</summary><div class=\"topic-body\"><p>L'enregistrement se poursuit même si l'écran est verrouillé ou qu'une autre application est au premier plan (mode audio en arrière-plan). Les appels API de transcription / résumé restent actifs en arrière-plan pendant plusieurs minutes, mais pour des durées longues (notamment avec les modèles Pro reasoning), il est préférable de garder l'application au premier plan. Si un téléversement cloud est interrompu, iOS le relancera automatiquement dès que possible.</p></div></details>\n<details id=\"privacy\"><summary>Confidentialité et gestion des données</summary><div class=\"topic-body\"><p>Les enregistrements audio sont stockés uniquement sur votre appareil et dans le(s) cloud(s) que vous avez sélectionné(s). Les clés API et fichiers JSON de compte de service sont chiffrés et stockés dans le Keychain de l'appareil. Les transcriptions / résumés sont envoyés directement aux serveurs du fournisseur IA que vous avez choisi. Aucune analyse, publicité ni suivi n'est effectué.</p></div></details>\n<details id=\"troubleshooting\"><summary>Résolution des problèmes</summary><div class=\"topic-body\"><p>La transcription est incorrecte : OpenAI Whisper-1 a tendance à insérer des marqueurs de silence dans les passages silencieux. Passer à gpt-4o-transcribe résout généralement ce problème.</p>\n<p>Les fichiers ne sont pas téléversés dans le cloud : Vérifiez que le cloud concerné affiche « Connecté » dans les réglages ; si le token OAuth a expiré, déconnectez-vous puis reconnectez-vous.</p>\n<p>L'Action Button ne répond pas : Vérifiez dans Réglages iOS → Bouton Action → Raccourcis que Toggle Recording de Voicloud Direct est bien sélectionné. Lors de la première utilisation, vous devez autoriser l'accès au microphone et les notifications.</p>\n<p>Si le problème persiste, veuillez nous contacter.</p></div></details>\n", "relatedLinks": "Liens utiles", "privacyLink": "Politique de confidentialité", "contact": "<div class=\"contact-box\"><h3>Nous contacter</h3><p>Pour signaler un problème, faire une demande de fonctionnalité ou poser une question, envoyez-nous un e-mail. Nous vous répondrons dans un délai de 1 à 3 jours ouvrés.</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"},
    "ko": {"title": "Voicloud Direct — 도움말 / 지원", "heading": "도움말 / 지원", "tagline": "자주 묻는 질문 및 트러블슈팅", "topics": "<details id=\"flow\"><summary>기본 사용법</summary><div class=\"topic-body\"><p>1. 홈 화면의 녹음 버튼을 탭하여 녹음을 시작합니다.\n2. 녹음을 중지하면 연결된 클라우드에 자동으로 업로드됩니다.\n3. 녹음 항목을 탭하여 상세 화면을 열고, 「AI에 보내기」또는 BYOK 받아쓰기를 실행합니다.\n4. 받아쓰기 결과는 동일한 클라우드에 .md 파일로 동기화됩니다.</p></div></details>\n<details id=\"cloud\"><summary>클라우드 연결하기</summary><div class=\"topic-body\"><p>지원 클라우드: iCloud Drive / Google Drive / Dropbox / OneDrive / Box 총 5가지입니다.</p>\n<p>Settings → 클라우드 동기화에서 연결할 서비스를 탭하여 로그인합니다. 연결된 모든 클라우드에 녹음 시 자동으로 업로드됩니다. iCloud Drive는 별도 로그인이 필요 없습니다. OS 측에서 iCloud Drive가 활성화되어 있으면 자동으로 사용됩니다. 녹음 후 클라우드를 추가한 경우에는 상세 화면의 「클라우드 동기화」섹션에서 나중에 업로드할 수 있습니다.</p></div></details>\n<details id=\"ai_send\"><summary>음성을 AI에 보내기 (Share Sheet)</summary><div class=\"topic-body\"><p>상세 화면의 「AI에 보내기」를 탭하면 iOS의 Share Sheet가 열립니다. NotebookLM이 설치되어 있으면 바로 음성 파일을 가져올 수 있습니다. 팁: Share Sheet에서 「편집」→ NotebookLM을 「즐겨찾기」에 추가하면 매번 목록 상단에 표시됩니다.</p></div></details>\n<details id=\"byok\"><summary>BYOK 받아쓰기 (API 키로 사용하기)</summary><div class=\"topic-body\"><p>직접 발급한 API 키를 사용하여 앱 내에서 바로 받아쓰기를 수행할 수 있습니다. 지원 프로바이더: OpenAI (화자 분리 미지원), Gemini AI Studio (무료 한도 있음, 화자 분리 지원), Vertex AI (Google Cloud 서비스 계정). Settings → AI 받아쓰기에서 프로바이더를 선택하고 API 키를 붙여넣습니다. 키는 기기의 Keychain에 암호화되어 저장됩니다.</p></div></details>\n<details id=\"summary\"><summary>요약 및 요약 프롬프트</summary><div class=\"topic-body\"><p>받아쓰기가 완료된 녹음은 동일한 프로바이더로 요약도 생성할 수 있습니다. Settings → 요약 프롬프트에서 프리셋을 선택하거나 자유롭게 편집할 수 있습니다 (기본 / 회의 의사록 / 잡담 / 인터뷰 / 메모). OpenAI는 요약용 모델을 별도로 지정할 수 있습니다 (예: gpt-4o-mini). Pro / reasoning 계열은 추론 시간이 길어지는 대신 품질이 향상됩니다.</p></div></details>\n<details id=\"diarization\"><summary>화자 분리 활용 팁</summary><div class=\"topic-body\"><p>Gemini 계열의 화자 분리는 음색이 비슷한 동성·동연령대 화자를 혼동하기 쉬운 단점이 있습니다. 대책: 상세 화면의 「화자 수」를 실제 인원으로 설정하면 정확도가 향상됩니다. Settings → 받아쓰기 프롬프트에서 고유한 힌트를 추가하는 것도 효과적입니다. OpenAI Whisper / gpt-4o-transcribe에서는 화자 분리 자체를 지원하지 않습니다.</p></div></details>\n<details id=\"playback\"><summary>재생·탐색·속도</summary><div class=\"topic-body\"><p>파형을 탭하거나 드래그하면 해당 위치로 이동하여 재생됩니다. 재생 속도는 「1x」를 탭할 때마다 0.75x → 1x → 1.25x → 1.5x → 2x 순으로 전환됩니다. 10초 되감기 / 앞으로 가기 버튼도 사용할 수 있습니다. 받아쓰기나 요약을 스크롤하는 중에도 파형과 재생 시각은 화면 상단에 고정되어 표시됩니다.</p></div></details>\n<details id=\"action_button\"><summary>Action Button 및 Live Activity (iPhone 15 Pro 이상)</summary><div class=\"topic-body\"><p>iPhone 15 Pro 이상에서는 본체 측면의 Action Button을 「Shortcuts → Voicloud Direct → Toggle Recording」에 할당하면 버튼을 길게 눌러 녹음 시작·중지가 가능합니다. 녹음 중에는 Dynamic Island와 잠금 화면에 빨간 배지가 표시되어 현재 경과 시간을 확인할 수 있습니다.</p></div></details>\n<details id=\"calendar_location\"><summary>캘린더 연동 및 위치 정보</summary><div class=\"topic-body\"><p>Settings → 녹음에서 캘린더 연동을 켜면 녹음 시작 시 캘린더에 진행 중인 일정이 있을 경우 해당 일정 이름이 파일 이름에 반영됩니다. 위치 정보를 켜면 녹음에 메타데이터로 좌표와 주소가 저장됩니다. 두 기능 모두 선택 사항으로, 꺼두어도 모든 기능을 사용할 수 있습니다.</p></div></details>\n<details id=\"background\"><summary>백그라운드 동작에 대하여</summary><div class=\"topic-body\"><p>화면 잠금 또는 다른 앱으로 전환된 상태에서도 녹음은 계속됩니다 (오디오 백그라운드 모드). 받아쓰기 / 요약 API 호출은 최대 수 분간 백그라운드에서도 유지되지만, 시간이 오래 걸리는 경우 (특히 Pro reasoning 계열)에는 앱을 전면에 유지하는 것이 안전합니다. 클라우드 업로드가 중단된 경우 iOS가 여유가 생길 때 자동으로 재시도합니다.</p></div></details>\n<details id=\"privacy\"><summary>개인 정보 및 데이터 처리</summary><div class=\"topic-body\"><p>녹음 음성은 기기 내부와 사용자가 선택한 클라우드에만 저장됩니다. API 키 / 서비스 계정 JSON은 기기의 Keychain에 암호화되어 저장됩니다. 받아쓰기 / 요약은 사용자가 선택한 AI 프로바이더의 서버로 직접 전송됩니다. 분석·광고·추적은 일절 수행하지 않습니다.</p></div></details>\n<details id=\"troubleshooting\"><summary>문제가 발생했을 때</summary><div class=\"topic-body\"><p>받아쓰기 결과가 이상합니다: OpenAI Whisper-1은 무음 구간에 「【빨리 감는 중】」을 삽입하는 경향이 있습니다. gpt-4o-transcribe로 전환하면 개선됩니다.</p>\n<p>클라우드에 업로드되지 않습니다: Settings에서 해당 클라우드가 「연결됨」 상태인지 확인하고, OAuth 토큰이 만료된 경우 한 번 연결을 해제한 후 다시 연결해 주십시오.</p>\n<p>Action Button이 반응하지 않습니다: iOS Settings → Action Button → Shortcuts → Voicloud Direct의 Toggle Recording이 선택되어 있는지 확인해 주십시오. 처음 사용 시 마이크 권한과 알림 권한을 허용해야 합니다.</p>\n<p>그래도 해결되지 않는 경우 문의해 주십시오.</p></div></details>\n", "relatedLinks": "관련 링크", "privacyLink": "개인정보 처리방침", "contact": "<div class=\"contact-box\"><h3>문의하기</h3><p>오류 신고·기능 요청·질문은 이메일로 보내주십시오. 평일 기준 1~3 영업일 이내에 답변드립니다.</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"},
    "zh-Hans": {"title": "Voicloud Direct — 帮助 / 支持", "heading": "帮助 / 支持", "tagline": "常见问题与故障排查", "topics": "<details id=\"flow\"><summary>基本使用方法</summary><div class=\"topic-body\"><p>1. 点击主页上的录音按钮开始录音。\n2. 停止后，音频将自动上传到已连接的云端。\n3. 点击录音打开详情页面，执行「发送给 AI」或 BYOK 转录。\n4. 转录结果将以 .md 文件的形式同步到相同的云端。</p></div></details>\n<details id=\"cloud\"><summary>连接云端</summary><div class=\"topic-body\"><p>支持的云端服务：iCloud Drive / Google Drive / Dropbox / OneDrive / Box，共 5 种。</p>\n<p>前往 Settings → 云端同步，点击要连接的服务并登录。所有已连接的云端将在录音时自动上传。iCloud Drive 无需登录，只要在系统设置中启用了 iCloud Drive，即可自动使用。若在录音后添加了云端服务，可在详情页面的「云端同步」区域补充上传。</p></div></details>\n<details id=\"ai_send\"><summary>将音频发送给 AI（Share Sheet）</summary><div class=\"topic-body\"><p>点击详情页面的「发送给 AI」，iOS 的 Share Sheet 将会打开。如果已安装 NotebookLM，可以直接将音频文件导入其中。提示：在 Share Sheet 中点击「编辑」→ 将 NotebookLM 添加到「常用」，以后每次都会显示在最顶部。</p></div></details>\n<details id=\"byok\"><summary>BYOK 转录（使用 API 密钥）</summary><div class=\"topic-body\"><p>使用您自己获取的 API 密钥，可在应用内直接进行转录。支持的提供商：OpenAI（不支持说话人分离）、Gemini AI Studio（有免费额度，支持说话人分离）、Vertex AI（Google Cloud 服务账号）。前往 Settings → AI 转录，选择提供商并粘贴 API 密钥。密钥将加密保存在设备的 Keychain 中。</p></div></details>\n<details id=\"summary\"><summary>摘要与摘要提示词</summary><div class=\"topic-body\"><p>已完成转录的录音，可通过相同提供商生成摘要。前往 Settings → 摘要提示词，可从预设中选择摘要风格，或自由编辑（标准 / 会议纪要 / 闲聊 / 采访 / 备忘）。OpenAI 可以单独指定摘要使用的模型（例如：gpt-4o-mini）。Pro / reasoning 系列推理时间更长，但质量更高。</p></div></details>\n<details id=\"diarization\"><summary>说话人分离技巧</summary><div class=\"topic-body\"><p>使用 Gemini 系列进行说话人分离时，对于声音相似的同性别、同年龄段说话人容易出现混淆。解决方法：在详情页面将「说话人数」设置为实际人数，可提高准确率。也可在 Settings → 转录提示词 中添加自定义线索。OpenAI Whisper / gpt-4o-transcribe 不支持说话人分离。</p></div></details>\n<details id=\"playback\"><summary>播放、跳转与速度</summary><div class=\"topic-body\"><p>点击或拖动波形，可跳转到该位置并开始播放。点击「1x」可按顺序切换播放速度：0.75x → 1x → 1.25x → 1.5x → 2x。也可使用快退 / 快进 10 秒按钮。在滚动转录或摘要内容时，波形和播放时间仍会固定显示在屏幕顶部。</p></div></details>\n<details id=\"action_button\"><summary>Action Button 与 Live Activity（iPhone 15 Pro 及更新机型）</summary><div class=\"topic-body\"><p>在 iPhone 15 Pro 及更新机型上，将机身侧面的 Action Button 分配至「Shortcuts → Voicloud Direct → Toggle Recording」，即可通过长按按钮来开始或停止录音。录音时，Dynamic Island 和锁屏界面将显示红色标识及当前录音时长。</p></div></details>\n<details id=\"calendar_location\"><summary>日历联动与位置信息</summary><div class=\"topic-body\"><p>在 Settings → 录音 中开启日历联动后，录音开始时若日历中有正在进行的日程，该日程名称将反映在文件名中。开启位置信息后，录音将以元数据形式保存坐标与地址。两者均为可选项，关闭后所有功能仍可正常使用。</p></div></details>\n<details id=\"background\"><summary>关于后台运行</summary><div class=\"topic-body\"><p>录音在锁屏或切换到其他应用时仍会继续进行（音频后台模式）。转录 / 摘要的 API 调用在后台最多可持续数分钟，但长时间任务（尤其是 Pro reasoning）建议将应用保持在前台。云端上传中途停止时，iOS 会在空闲时自动重试。</p></div></details>\n<details id=\"privacy\"><summary>隐私与数据处理</summary><div class=\"topic-body\"><p>录音音频仅保存在设备本地和您选择的云端中。API 密钥 / 服务账号 JSON 将加密保存在设备的 Keychain 中。转录 / 摘要内容将直接发送至您选择的 AI 提供商的服务器。我们不进行任何分析、广告或追踪。</p></div></details>\n<details id=\"troubleshooting\"><summary>遇到问题时</summary><div class=\"topic-body\"><p>转录结果异常：OpenAI Whisper-1 有时会在静音区间插入「【正在快进】」等内容。切换至 gpt-4o-transcribe 可改善此问题。</p>\n<p>无法上传到云端：请在设置中确认该云端服务显示为「已连接」，如果 OAuth 令牌已过期，请断开连接后重新连接。</p>\n<p>Action Button 无响应：请确认 iOS Settings → Action Button → Shortcuts → 已选择 Voicloud Direct 的 Toggle Recording。首次使用时需要允许麦克风权限和通知权限。</p>\n<p>如果问题仍未解决，请联系我们。</p></div></details>\n", "relatedLinks": "相关链接", "privacyLink": "隐私政策", "contact": "<div class=\"contact-box\"><h3>联系我们</h3><p>如有问题、功能请求或疑问，请发送邮件联系。工作日内将在 1-3 个工作日内回复。</p><p><a href=\"mailto:monma.free@gmail.com\">monma.free@gmail.com</a></p></div>"}
  };

  function getLang() {
    var p = new URLSearchParams(location.search).get('lang');
    if (p && i18n[p]) return p;
    var bl = (navigator.language || 'ja');
    if (bl.startsWith('zh')) return 'zh-Hans';
    var s = bl.slice(0,2);
    return i18n[s] ? s : 'ja';
  }

  function render(lang) {
    var d = i18n[lang];
    document.title = d.title;
    document.documentElement.lang = lang;
    history.replaceState({},'','?lang='+lang);
    var bar = document.getElementById('lang-bar');
    bar.innerHTML = LANGS.map(function(l) {
      return '<button class="lang-btn' + (l===lang?' active':'') + '" onclick="render(\'' + l + '\')">' + LABELS[l] + '</button>';
    }).join('');
    var privacyLang = '?lang=' + lang;
    document.getElementById('content').innerHTML =
      '<div class="page-header"><h1>' + d.heading + '</h1><p class="subtitle">' + d.tagline + '</p></div>' +
      d.topics +
      '<div class="related-links"><h3>' + d.relatedLinks + '</h3><div class="link-row"><a class="link-pill" href="voicloud-direct.html' + privacyLang + '">' + d.privacyLink + '</a></div></div>' +
      d.contact +
      '<div class="footer">&copy; 2026 Mon Software</div>';
  }

  window.render = render;
  render(getLang());
})();
</script>
